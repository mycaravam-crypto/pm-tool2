services:
  app:
    build: .
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      # Set to the real origin this is served from (locks down CORS — see
      # server/index.js). Defaults to localhost, which is only right for
      # trying this out locally.
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-ChronosPM <no-reply@chronospm.local>}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 7 * * *}
    volumes:
      # Named volume, not a bind mount — the SQLite file needs to survive
      # `docker compose down`/image rebuilds. Back it up with
      # `docker compose exec app npm run backup -w server` (writes into this
      # same volume; copy the resulting file out with `docker cp` afterward).
      - chronos-data:/app/server/data
    restart: unless-stopped

volumes:
  chronos-data:
